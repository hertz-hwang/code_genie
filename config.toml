# =========================================================================
# 🔧 CodeGenie 配置文件
# =========================================================================

# -------------------------------------------------------------------------
# 📂 文件路径配置
# -------------------------------------------------------------------------
[files]
fixed = "input-fixed.txt"        # 固定字根文件
dynamic = "input-roots.txt"      # 动态字根文件
splits = "input-division.txt"    # 拆分表文件
pair_equiv = "pair_equivalence.txt"  # 字根对当量文件
key_dist = "key_distribution.txt"    # 用指分布文件

# -------------------------------------------------------------------------
# ⌨️ 键位配置
# -------------------------------------------------------------------------
[keys]
# 允许的键位字符（用于动态字根分配）
allowed = "qwertyuiopasdfghjklzxcvbnm"
# 键位显示顺序（用于输出报告）
display_order = "qwertyuiopasdfghjklzxcvbnm"

# -------------------------------------------------------------------------
# ⚖️ 权重配置
# -------------------------------------------------------------------------
[weights.full_code]
# 全码部分权重（总和应为 1.0）
collision_count = 1.0    # 重码数权重
collision_rate = 0.0     # 重码率权重
equivalence = 0.0        # 当量权重
equiv_cv = 0.0           # 当量变异系数权重
distribution = 0.0       # 分布偏差权重

[weights.simple_code]
# 简码优化开关与权重
enabled = false           # 是否启用简码优化
full_code_weight = 1.0   # 全码目标总权重
simple_code_weight = 0.0 # 简码目标总权重

# 简码内部子权重（总和应为 1.0）
freq = 0.0               # 频率覆盖权重
equiv = 0.0              # 当量权重
dist = 0.0               # 分布偏差权重
collision_count = 0.0    # 重码数权重
collision_rate = 0.0     # 重码率权重

# -------------------------------------------------------------------------
# 🌡️ 模拟退火参数
# -------------------------------------------------------------------------
[annealing]
threads = 16             # 并行线程数
total_steps = 100000000     # 总迭代步数
temp_start = 1.0         # 初始温度
temp_end = 0.000001      # 结束温度
comfort_temp = 0.2       # 舒适温度区间
comfort_width = 0.15     # 舒适区宽度
comfort_slowdown = 0.7   # 舒适区减速因子
swap_probability = 0.6   # 交换操作概率

# 以下参数基于 total_steps 的比例计算
min_improve_steps_ratio = 0.1    # 最小改进步数比例 (total_steps / 10)
perturb_interval_ratio = 0.05    # 扰动间隔比例 (total_steps / 20)
perturb_strength = 0.15          # 扰动强度
reheat_factor = 1.15             # 重新加热因子
max_parts = 3                    # 最大码长

# -------------------------------------------------------------------------
# 📝 简码规则配置
# -------------------------------------------------------------------------
# 取码规则说明:
#   每两个字符为一组，第一个字符选择逻辑根，第二个字符选择该根的码位
#   根选择: A=第1根, B=第2根, C=第3根, ... Z=最后一根
#   码位选择: a=第1码, b=第2码, c=第3码, ... z=最后一码
#
# 示例: 全码为4码定长方案，拆分 "在 𠂇 𠂇.1 2 土 土.1"
#   逻辑根: [𠂇(码=[𠂇,𠂇.1]), 2(码=[2]), 土(码=[土,土.1])]
#   Aa = 𠂇的第1码, Ab = 𠂇的第2码
#   Ba = 2的第1码
#   Ca = 土的第1码, Cz = 土的最后一码
#   Za = 最后一根(土)的第1码, Zz = 最后一根(土)的最后一码

[[simple_levels]]
level = 1
code_num = 0             # 一级简码：每键0字
rules = ["Aa"]           # 取首根第1码

[[simple_levels]]
level = 2
code_num = 0             # 二级简码：每键1字
rules = ["AaBa"]         # 取首根第1码 + 末根末码

[[simple_levels]]
level = 3
code_num = 0             # 三级简码：每键1字
rules = ["AaAbZz", "AaBaZz"]  # 两种候选规则